# VULNERABLE HAProxy 3.0.10 (< 3.0.19) QUIC edge -> tap -> single echo origin.
# For reproducing CVE-2026-33555 (standalone-FIN H3->H1 desync) as the sentinel.
services:
  origin:
    image: python:3.13-slim
    working_dir: /app
    volumes: [ "../:/app:ro", "./logs:/logs" ]
    environment: { PYTHONPATH: /app/src, QD_ECHO_HOST: "0.0.0.0", QD_ECHO_PORT: "8080", QD_ECHO_LOG: /logs/echo_vuln.jsonl , CONN_LOG: /logs/conn_bk.log}
    command: python /app/lab_h3cve/conn_bk.py
    networks: { h3net: { ipv4_address: 172.40.0.10 } }
  tap_eo:
    image: python:3.12-slim
    command: python /app/tap.py
    environment: { TAP_LISTEN: "8081", TAP_UP: "172.40.0.10:8080", TAP_LOG: "/logs/tap_eo.jsonl" }
    volumes: [ "./tap.py:/app/tap.py:ro", "./logs:/logs" ]
    depends_on: [origin]
    networks: { h3net: { ipv4_address: 172.40.0.11 } }
  edge:
    image: haproxytech/haproxy-alpine:3.0.10
    depends_on: [tap_eo]
    ports:
      - "127.0.0.1:4434:4434/udp"
      - "127.0.0.1:4434:4434/tcp"
    volumes:
      - ./haproxy_vuln.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ../lab/certs:/certs:ro
    networks: { h3net: { ipv4_address: 172.40.0.12 } }
networks:
  h3net: { ipam: { config: [ { subnet: 172.40.0.0/24 } ] } }

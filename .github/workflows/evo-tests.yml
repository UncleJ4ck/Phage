name: evo-tests

on:
  push:
    paths:
      - "src/phage/evo/**"
      - "tests/**"
      - ".github/workflows/evo-tests.yml"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e . ruff
      - name: Lint
        run: |
          ruff check src/phage/evo tests
          ruff format --check src/phage/evo tests
      - name: Unit + fuzz suite
        run: python -m unittest discover -s tests -v

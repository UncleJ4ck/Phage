global
    log stdout format raw local0 info
    maxconn 4096
    tune.ssl.default-dh-param 2048
    ssl-default-bind-options ssl-min-ver TLSv1.2
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384

defaults
    mode http
    log global
    option httplog
    option forwardfor
    option http-keep-alive
    timeout connect 5s
    timeout client 30s
    timeout client-fin 5s
    timeout server 30s
    timeout http-request 10s
    timeout http-keep-alive 2s
    retries 3
    default-server inter 3s fall 3 rise 2 maxconn 512

frontend stats
    bind 0.0.0.0:8404
    stats enable
    stats uri /stats
    stats refresh 10s

frontend web
    # HTTP/3 over QUIC (UDP) with a TLS/H2/H1 fallback on the same port.
    bind quic4@0.0.0.0:4433 ssl crt /certs/lab.pem alpn h3
    bind 0.0.0.0:4433 ssl crt /certs/lab.pem alpn h2,http/1.1
    http-response set-header alt-svc "h3=\":4433\"; ma=86400"
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Request-ID %[uuid()]
    default_backend origins

backend origins
    balance roundrobin
    # Prod default. For clean single-request oracle correlation the docs note a
    # detection-mode toggle (one origin + `http-reuse never`).
    http-reuse safe
    option httpchk GET /health
    http-check expect status 200
    server origin1 origin1:8080 check
    server origin2 origin2:8080 check

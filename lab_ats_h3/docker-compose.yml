# ATS 10.1.2 H3 (quiche) edge -> tap -> echo origin. Fuzz ATS's H3->H1 downgrade
# with the QUIC-state genes (standalone FIN, body-length-lie).
services:
  origin:
    image: python:3.13-slim
    working_dir: /app
    volumes: [ "../:/app:ro", "./logs:/logs" ]
    environment: { PYTHONPATH: /app/src, QD_ECHO_HOST: "0.0.0.0", QD_ECHO_PORT: "8080", QD_ECHO_LOG: /logs/echo_ats.jsonl }
    command: python -m phage.evo.echo_backend
    networks: { a3: { ipv4_address: 172.41.0.10 } }
  tap_ae:
    image: python:3.12-slim
    command: python /app/tap.py
    environment: { TAP_LISTEN: "9095", TAP_UP: "172.41.0.10:8080", TAP_LOG: "/logs/tap_ae.jsonl" }
    volumes: [ "./tap.py:/app/tap.py:ro", "./logs:/logs" ]
    depends_on: [origin]
    networks: { a3: { ipv4_address: 172.41.0.11 } }
  ats:
    image: trafficserver/trafficserver:latest
    depends_on: [tap_ae]
    ports:
      - "127.0.0.1:4436:4436/udp"
      - "127.0.0.1:4436:4436/tcp"
    volumes:
      - ./records.yaml:/opt/etc/trafficserver/records.yaml:ro
      - ./remap.config:/opt/etc/trafficserver/remap.config:ro
      - ./ip_allow.yaml:/opt/etc/trafficserver/ip_allow.yaml:ro
      - ./ssl_multicert.config:/opt/etc/trafficserver/ssl_multicert.config:ro
      - ./lab.crt:/certs/lab.crt:ro
      - ./lab.key:/certs/lab.key:ro
      - ./lab.pem:/certs/lab.pem:ro
    networks: { a3: { ipv4_address: 172.41.0.12 } }
networks:
  a3: { ipam: { config: [ { subnet: 172.41.0.0/24 } ] } }

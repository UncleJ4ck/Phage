services:
  origin:
    image: node:22-alpine
    working_dir: /app
    volumes: [ "./chunk_bk.js:/app/chunk_bk.js:ro", "./logs:/logs" ]
    environment: { CHUNK_LOG: /logs/chunk_bk.log }
    command: node /app/chunk_bk.js
    networks: { s2: { ipv4_address: 172.45.0.10 } }
  tap_sb:
    image: python:3.12-slim
    command: python /app/tap.py
    environment: { TAP_LISTEN: "9100", TAP_UP: "172.45.0.10:8080", TAP_LOG: "/logs/tap_sb.jsonl" }
    volumes: [ "./tap.py:/app/tap.py:ro", "./logs:/logs" ]
    depends_on: [origin]
    networks: { s2: { ipv4_address: 172.45.0.11 } }
  sozu:
    image: clevercloud/sozu:latest
    command: ["start","-c","/etc/sozu/sozu.toml"]
    volumes: [ "./sozu.toml:/etc/sozu/sozu.toml:ro", "./lab.crt:/certs/lab.crt:ro", "./lab.key:/certs/lab.key:ro" ]
    ports: [ "127.0.0.1:8443:8443/tcp" ]
    depends_on: [tap_sb]
    networks: { s2: { ipv4_address: 172.45.0.12 } }
networks:
  s2: { ipam: { config: [ { subnet: 172.45.0.0/24 } ] } }

services:
  origin:
    image: python:3.13-slim
    working_dir: /app
    volumes: [ "../:/app:ro", "./logs:/logs" ]
    environment: { CONN_LOG: /logs/conn_bk.log }
    command: python /app/lab_sozu_h1/conn_bk.py
    networks: { s1: { ipv4_address: 172.46.0.10 } }
  tap_sn:
    image: python:3.12-slim
    command: python /app/tap.py
    environment: { TAP_LISTEN: "9101", TAP_UP: "172.46.0.10:8080", TAP_LOG: "/logs/tap_sn.jsonl" }
    volumes: [ "./tap.py:/app/tap.py:ro", "./logs:/logs" ]
    depends_on: [origin]
    networks: { s1: { ipv4_address: 172.46.0.11 } }
  sozu:
    image: clevercloud/sozu:latest
    command: ["start","-c","/etc/sozu/sozu.toml"]
    volumes: [ "./sozu.toml:/etc/sozu/sozu.toml:ro" ]
    ports: [ "127.0.0.1:9200:9200/tcp" ]
    depends_on: [tap_sn]
    networks: { s1: { ipv4_address: 172.46.0.12 } }
networks:
  s1: { ipam: { config: [ { subnet: 172.46.0.0/24 } ] } }

# Caddy (quic-go) H3 edge -> tap -> echo origin. Test the standalone-FIN / body-
# length-lie H3->H1 downgrade against quic-go's engine.
services:
  origin:
    image: python:3.13-slim
    working_dir: /app
    volumes: [ "../:/app:ro", "./logs:/logs" ]
    environment: { PYTHONPATH: /app/src, QD_ECHO_HOST: "0.0.0.0", QD_ECHO_PORT: "8080", QD_ECHO_LOG: /logs/echo_caddy.jsonl , CONN_LOG: /logs/conn_bk.log}
    command: python /app/lab_caddy_h3/conn_bk.py
    networks: { c3: { ipv4_address: 172.42.0.10 } }
  tap_cb:
    image: python:3.12-slim
    command: python /app/tap.py
    environment: { TAP_LISTEN: "9096", TAP_UP: "172.42.0.10:8080", TAP_LOG: "/logs/tap_cb.jsonl" }
    volumes: [ "./tap.py:/app/tap.py:ro", "./logs:/logs" ]
    depends_on: [origin]
    networks: { c3: { ipv4_address: 172.42.0.11 } }
  caddy:
    image: caddy:2
    depends_on: [tap_cb]
    ports:
      - "127.0.0.1:4437:4437/udp"
      - "127.0.0.1:4437:4437/tcp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./lab.crt:/certs/lab.crt:ro
      - ./lab.key:/certs/lab.key:ro
    networks: { c3: { ipv4_address: 172.42.0.12 } }
networks:
  c3: { ipam: { config: [ { subnet: 172.42.0.0/24 } ] } }
